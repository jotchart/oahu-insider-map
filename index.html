<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Interactive map of 88 Oahu neighborhoods scored 1-10 by real residents. Filter by region and score to find your ideal area.">
  <meta name="theme-color" content="#1a1a2e">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="Oahu Map">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Oahu Neighborhoods — Real Talk Map">
  <meta property="og:description" content="88 Oahu neighborhoods scored 1-10 by real residents">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512.png">

  <title>Oahu Neighborhoods — Real Talk Map</title>

  <!-- Fonts (non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700;900&display=swap">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Turf.js for isochrone calculations -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <!-- App -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ar.css">
  <link rel="stylesheet" href="css/features.css">
</head>
<body>

  <button class="chrome-toggle" id="chromeToggle" aria-label="Toggle UI" title="Hide/show controls">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>

  <nav class="filter-bar" id="filterBar" aria-label="Filter neighborhoods">
    <button class="pill" data-region="all" aria-pressed="true">All</button>
    <button class="pill" data-region="Metro Honolulu" aria-pressed="false">Metro Honolulu</button>
    <button class="pill" data-region="East Honolulu" aria-pressed="false">East Honolulu</button>
    <button class="pill" data-region="Windward" aria-pressed="false">Windward</button>
    <button class="pill" data-region="North Shore" aria-pressed="false">North Shore</button>
    <button class="pill" data-region="Central Oahu" aria-pressed="false">Central Oahu</button>
    <button class="pill" data-region="Pearl City / Aiea" aria-pressed="false">Pearl City / Aiea</button>
    <button class="pill" data-region="West Oahu" aria-pressed="false">West</button>
    <button class="pill" data-region="Leeward Coast" aria-pressed="false">Leeward</button>
    <div class="divider" role="separator"></div>
    <button class="pill" data-minscore="8" aria-pressed="false" title="Show score 8 and above">8+</button>
    <button class="pill" data-minscore="6" aria-pressed="false" title="Show score 6 and above">6+</button>
    <div class="divider" role="separator"></div>
    <button class="pill crime-pill" id="crimePill" aria-pressed="false" title="Toggle crime density overlay">&#128680; Crime</button>
    <button class="pill hood-pill" id="hoodPill" aria-pressed="true" title="Toggle neighborhood dots and boundaries">&#127968; Hoods</button>
    <div class="divider" role="separator"></div>
    <button class="pill calendar-pill" id="calendarPill" aria-pressed="false" title="Seasonal calendar &amp; events">&#128197; Calendar</button>
    <button class="pill ocean-pill" id="oceanPill" aria-pressed="false" title="Ocean conditions dashboard">&#127754; Ocean</button>
    <button class="pill weather-pill" id="weatherPill" aria-pressed="false" title="Weather microclimate overlay">&#9925; Weather</button>
    <button class="pill safety-pill" id="safetyPill" aria-pressed="false" title="Safety &amp; emergency info">&#9888;&#65039; Safety</button>
    <div class="filter-spacer"></div>
    <div class="search-wrap" role="combobox" aria-expanded="false" aria-haspopup="listbox">
      <span class="search-icon" aria-hidden="true">&#x1F50D;</span>
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Search…"
        autocomplete="off"
        aria-label="Search neighborhoods"
        aria-controls="searchResults"
      >
      <button id="searchClear" class="search-clear" aria-label="Clear search">&times;</button>
      <div id="searchResults" class="search-results" role="listbox"></div>
    </div>
    <button class="list-toggle" id="listToggle" aria-expanded="false" aria-controls="listView">&#9776;</button>
  </nav>

  <nav class="spot-bar" id="spotBar" aria-label="Insider spot layers">
    <span class="spot-bar-label">Spots</span>
    <button class="spot-pill" data-spot="restaurant" aria-pressed="true"><span class="spot-pill-icon">&#127869;</span> Food</button>
    <button class="spot-pill" data-spot="beach" aria-pressed="true"><span class="spot-pill-icon">&#127958;</span> Beaches</button>
    <button class="spot-pill" data-spot="snorkel" aria-pressed="true"><span class="spot-pill-icon">&#129343;</span> Snorkel</button>
    <button class="spot-pill" data-spot="hike" aria-pressed="true"><span class="spot-pill-icon">&#129406;</span> Hikes</button>
    <button class="spot-pill" data-spot="kids" aria-pressed="true"><span class="spot-pill-icon">&#128118;</span> Kids</button>
    <button class="spot-pill" data-spot="shave-ice" aria-pressed="true"><span class="spot-pill-icon">&#127847;</span> Shave Ice</button>
    <button class="spot-pill" data-spot="coffee" aria-pressed="true"><span class="spot-pill-icon">&#9749;</span> Coffee</button>
    <span class="spot-bar-divider"></span>
    <span class="spot-bar-label">Tier</span>
    <button class="spot-pill tier-pill" data-tier="S" aria-pressed="true"><span class="tier-badge tier-S">S</span></button>
    <button class="spot-pill tier-pill" data-tier="A" aria-pressed="true"><span class="tier-badge tier-A">A</span></button>
    <button class="spot-pill tier-pill" data-tier="B" aria-pressed="true"><span class="tier-badge tier-B">B</span></button>
    <button class="spot-pill tier-pill" data-tier="C" aria-pressed="true"><span class="tier-badge tier-C">C</span></button>
  </nav>

  <div class="right-now-bar" id="rightNowBar" style="display:none">
    <div class="rn-item"><span class="rn-icon">&#127754;</span> <span class="rn-label">Surf:</span> <span class="rn-value" id="rnSurf">--</span></div>
    <div class="rn-item"><span class="rn-icon">&#128168;</span> <span class="rn-label">Wind:</span> <span class="rn-value" id="rnWind">--</span></div>
    <div class="rn-item"><span class="rn-icon">&#127749;</span> <span class="rn-label">Sunset:</span> <span class="rn-value" id="rnSunset">--</span></div>
    <div class="rn-item"><span class="rn-icon">&#127754;</span> <span class="rn-label">Tide:</span> <span class="rn-value" id="rnTide">--</span></div>
    <div class="rn-item rn-alert" id="rnAlert" style="display:none"></div>
  </div>

  <div id="map" role="application" aria-label="Map of Oahu neighborhoods"></div>

  <footer class="bottom-panel">
    <span class="count-badge" aria-live="polite">Showing <strong id="countDisplay">88</strong> of 88</span>
    <button class="gps-btn" id="gpsBtn" aria-label="Show my location" title="Show my location">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
    </button>
    <div class="legend-row" aria-label="Score color legend">
      <div class="legend-dot" style="background:#c62828"></div><span class="legend-label">1</span>
      <div class="legend-dot" style="background:#ef5350"></div>
      <div class="legend-dot" style="background:#ff8a65"></div>
      <div class="legend-dot" style="background:#ffb74d"></div>
      <div class="legend-dot" style="background:#fff176"></div>
      <div class="legend-dot" style="background:#dce775"></div>
      <div class="legend-dot" style="background:#a5d6a7"></div>
      <div class="legend-dot" style="background:#69f0ae"></div>
      <div class="legend-dot" style="background:#2ee67a"></div>
      <div class="legend-dot" style="background:#00c853"></div><span class="legend-label">10</span>
    </div>
  </footer>

  <!-- Screen reader live region for filter changes -->
  <div id="liveRegion" class="sr-only" aria-live="polite" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

  <div class="list-view" id="listView" role="dialog" aria-label="Neighborhood list">
    <div class="list-header">
      <h2>All Neighborhoods</h2>
      <button class="close-list" id="closeList" aria-label="Close list">&times;</button>
    </div>
    <div class="list-scroll" id="listScroll" role="list"></div>
  </div>

  <div class="install-banner" id="installBanner" role="alert">
    <p>Add to home screen for instant access</p>
    <button class="install-btn" id="installBtn">Install</button>
    <button class="dismiss-btn" id="dismissBtn" aria-label="Dismiss">&times;</button>
  </div>

  <div class="panel-container" id="panelContainer"></div>

  <div class="ar-container" id="arContainer" role="dialog" aria-label="AR neighborhood view"></div>

  <script>
    if (typeof L === 'undefined') {
      document.getElementById('map').innerHTML = '<p style="padding:40px;color:#e94560;text-align:center">Map library failed to load. Please reload.</p>';
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Interactive map of 88 Oahu neighborhoods scored 1-10 by real residents. Filter by region and score to find your ideal area.">
  <meta name="theme-color" content="#1a1a2e">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="Oahu Map">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Oahu Neighborhoods — Real Talk Map">
  <meta property="og:description" content="88 Oahu neighborhoods scored 1-10 by real residents">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512.png">

  <title>Oahu Neighborhoods — Real Talk Map</title>

  <!-- Fonts (non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@700;900&display=swap">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Turf.js for isochrone calculations -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <!-- App -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ar.css">
  <link rel="stylesheet" href="css/features.css">
</head>
<body>

  <!-- ── Top Bar: search + menu ── -->
  <header class="top-bar" id="topBar">
    <div class="search-wrap" role="combobox" aria-expanded="false" aria-haspopup="listbox">
      <svg class="search-icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Search neighborhoods, spots..."
        autocomplete="off"
        aria-label="Search neighborhoods and spots"
        aria-controls="searchResults"
      >
      <button id="searchClear" class="search-clear" aria-label="Clear search">&times;</button>
      <div id="searchResults" class="search-results" role="listbox"></div>
    </div>
    <button class="gps-btn" id="gpsBtn" aria-label="Show my location" title="Show my location">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
    </button>
    <button class="menu-btn" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="drawer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
  </header>

  <!-- ── Drawer: all filters, spots, layers ── -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-label="Filters and layers">
    <div class="drawer-header">
      <h2>Filters &amp; Layers</h2>
      <button class="drawer-close" id="drawerClose" aria-label="Close menu">&times;</button>
    </div>
    <div class="drawer-body">

      <!-- Spot Categories -->
      <section class="drawer-section" id="spotBar">
        <h3 class="drawer-section-title">Spots</h3>
        <div class="drawer-pills">
          <button class="spot-pill" data-spot="restaurant" aria-pressed="false">Food</button>
          <button class="spot-pill" data-spot="beach" aria-pressed="false">Beaches</button>
          <button class="spot-pill" data-spot="snorkel" aria-pressed="false">Snorkel</button>
          <button class="spot-pill" data-spot="hike" aria-pressed="false">Hikes</button>
          <button class="spot-pill" data-spot="kids" aria-pressed="false">Kids</button>
          <button class="spot-pill" data-spot="shave-ice" aria-pressed="false">Shave Ice</button>
          <button class="spot-pill" data-spot="coffee" aria-pressed="false">Coffee</button>
          <button class="spot-pill" data-spot="market" aria-pressed="false">Markets</button>
          <button class="spot-pill" data-spot="nightlife" aria-pressed="false">Nightlife</button>
          <button class="spot-pill" data-spot="cultural" aria-pressed="false">Culture</button>
          <button class="spot-pill" data-spot="bakery" aria-pressed="false">Bakeries</button>
          <button class="spot-pill" data-spot="farmers-market" aria-pressed="false">Farmers Mkt</button>
          <button class="spot-pill" data-spot="shopping" aria-pressed="false">Shopping</button>
          <button class="spot-pill" data-spot="experience" aria-pressed="false">Experiences</button>
        </div>
      </section>

      <!-- Food Genre (shown when a food category is active) -->
      <section class="drawer-section hidden" id="genreSection">
        <h3 class="drawer-section-title">Cuisine</h3>
        <div class="drawer-pills" id="genrePills"></div>
      </section>

      <!-- Tier -->
      <section class="drawer-section">
        <h3 class="drawer-section-title">Tier</h3>
        <div class="drawer-pills">
          <button class="spot-pill tier-pill" data-tier="S" aria-pressed="true"><span class="tier-badge tier-S">S</span></button>
          <button class="spot-pill tier-pill" data-tier="A" aria-pressed="true"><span class="tier-badge tier-A">A</span></button>
          <button class="spot-pill tier-pill" data-tier="B" aria-pressed="true"><span class="tier-badge tier-B">B</span></button>
          <button class="spot-pill tier-pill" data-tier="C" aria-pressed="true"><span class="tier-badge tier-C">C</span></button>
        </div>
      </section>

      <!-- Collapsible: More Filters -->
      <section class="drawer-section drawer-more-toggle">
        <button class="drawer-expand-btn" id="drawerMoreBtn" aria-expanded="false">
          More Filters <span class="expand-chevron">&#9660;</span>
        </button>
      </section>

      <div id="drawerMoreSections" class="drawer-more-sections hidden">
        <!-- Region -->
        <section class="drawer-section">
          <h3 class="drawer-section-title">Region</h3>
          <div class="drawer-pills" id="filterBar">
            <button class="pill" data-region="all" aria-pressed="true">All</button>
            <button class="pill" data-region="Metro Honolulu" aria-pressed="false">Metro Honolulu</button>
            <button class="pill" data-region="East Honolulu" aria-pressed="false">East Honolulu</button>
            <button class="pill" data-region="Windward" aria-pressed="false">Windward</button>
            <button class="pill" data-region="North Shore" aria-pressed="false">North Shore</button>
            <button class="pill" data-region="Central Oahu" aria-pressed="false">Central Oahu</button>
            <button class="pill" data-region="Pearl City / Aiea" aria-pressed="false">Pearl City / Aiea</button>
            <button class="pill" data-region="West Oahu" aria-pressed="false">West</button>
            <button class="pill" data-region="Leeward Coast" aria-pressed="false">Leeward</button>
          </div>
        </section>

        <!-- Score -->
        <section class="drawer-section">
          <h3 class="drawer-section-title">Min Score</h3>
          <div class="drawer-pills">
            <button class="pill" data-minscore="8" aria-pressed="false">8+</button>
            <button class="pill" data-minscore="6" aria-pressed="false">6+</button>
          </div>
        </section>

        <!-- Map Layers -->
        <section class="drawer-section">
          <h3 class="drawer-section-title">Map Layers</h3>
          <div class="drawer-pills">
            <button class="pill hood-pill" id="hoodPill" aria-pressed="false">Neighborhoods</button>
            <button class="pill crime-pill" id="crimePill" aria-pressed="false">Crime</button>
            <button class="pill calendar-pill" id="calendarPill" aria-pressed="false">Calendar</button>
            <button class="pill ocean-pill" id="oceanPill" aria-pressed="false">Ocean</button>
            <button class="pill weather-pill" id="weatherPill" aria-pressed="false">Weather</button>
            <button class="pill safety-pill" id="safetyPill" aria-pressed="false">Safety</button>
            <button class="pill buzz-pill" id="buzzPill" aria-pressed="false">Buzz</button>
            <button class="pill streets-pill" id="streetsPill" aria-pressed="false">Streets</button>
          </div>
        </section>

        <!-- Neighborhood List -->
        <section class="drawer-section drawer-section-list">
          <h3 class="drawer-section-title">
            Neighborhoods
            <span class="count-badge" aria-live="polite"><strong id="countDisplay">88</strong> / 88</span>
          </h3>
          <div class="list-scroll" id="listScroll" role="list"></div>
        </section>
      </div>

    </div>
  </aside>

  <!-- ── Right Now Bar (shown by ocean/weather features) ── -->
  <div class="right-now-bar" id="rightNowBar" style="display:none">
    <div class="rn-item"><span class="rn-label">Surf:</span> <span class="rn-value" id="rnSurf">--</span></div>
    <div class="rn-item"><span class="rn-label">Wind:</span> <span class="rn-value" id="rnWind">--</span></div>
    <div class="rn-item"><span class="rn-label">Sunset:</span> <span class="rn-value" id="rnSunset">--</span></div>
    <div class="rn-item"><span class="rn-label">Tide:</span> <span class="rn-value" id="rnTide">--</span></div>
    <div class="rn-item rn-alert" id="rnAlert" style="display:none"></div>
  </div>

  <!-- ── Category Cards Overlay (shown on first load) ── -->
  <div id="categoryCards" class="category-cards">
    <div class="category-cards-title">What are you looking for?</div>
    <div class="category-cards-grid">
      <button class="cat-card" data-cat="neighborhoods"><span class="cat-card-icon">🏘</span>Neighborhoods</button>
      <button class="cat-card" data-cat="restaurant"><span class="cat-card-icon">🍽</span>Food</button>
      <button class="cat-card" data-cat="beach"><span class="cat-card-icon">🏖</span>Beaches</button>
      <button class="cat-card" data-cat="snorkel"><span class="cat-card-icon">🤿</span>Snorkel</button>
      <button class="cat-card" data-cat="hike"><span class="cat-card-icon">🥾</span>Hikes</button>
      <button class="cat-card" data-cat="kids"><span class="cat-card-icon">👶</span>Kids</button>
      <button class="cat-card" data-cat="shave-ice"><span class="cat-card-icon">🍧</span>Shave Ice</button>
      <button class="cat-card" data-cat="coffee"><span class="cat-card-icon">☕</span>Coffee</button>
      <button class="cat-card" data-cat="market"><span class="cat-card-icon">🏪</span>Markets</button>
      <button class="cat-card" data-cat="nightlife"><span class="cat-card-icon">🍸</span>Nightlife</button>
      <button class="cat-card" data-cat="cultural"><span class="cat-card-icon">🏛</span>Culture</button>
      <button class="cat-card" data-cat="bakery"><span class="cat-card-icon">🧁</span>Bakeries</button>
      <button class="cat-card" data-cat="farmers-market"><span class="cat-card-icon">🥬</span>Farmers Mkt</button>
      <button class="cat-card" data-cat="shopping"><span class="cat-card-icon">🛍</span>Shopping</button>
      <button class="cat-card" data-cat="experience"><span class="cat-card-icon">✨</span>Experiences</button>
    </div>
  </div>

  <!-- ── Bottom Category Bar (hidden until first pick) ── -->
  <div id="categoryBar" class="category-bar hidden">
    <button class="cat-icon" data-cat="neighborhoods" aria-pressed="false" title="Neighborhoods">🏘</button>
    <button class="cat-icon" data-cat="restaurant" aria-pressed="false" title="Food">🍽</button>
    <button class="cat-icon" data-cat="beach" aria-pressed="false" title="Beaches">🏖</button>
    <button class="cat-icon" data-cat="snorkel" aria-pressed="false" title="Snorkel">🤿</button>
    <button class="cat-icon" data-cat="hike" aria-pressed="false" title="Hikes">🥾</button>
    <button class="cat-icon" data-cat="kids" aria-pressed="false" title="Kids">👶</button>
    <button class="cat-icon" data-cat="shave-ice" aria-pressed="false" title="Shave Ice">🍧</button>
    <button class="cat-icon" data-cat="coffee" aria-pressed="false" title="Coffee">☕</button>
    <button class="cat-icon" data-cat="market" aria-pressed="false" title="Markets">🏪</button>
    <button class="cat-icon" data-cat="nightlife" aria-pressed="false" title="Nightlife">🍸</button>
    <button class="cat-icon" data-cat="cultural" aria-pressed="false" title="Culture">🏛</button>
    <button class="cat-icon" data-cat="bakery" aria-pressed="false" title="Bakeries">🧁</button>
    <button class="cat-icon" data-cat="farmers-market" aria-pressed="false" title="Farmers Mkt">🥬</button>
    <button class="cat-icon" data-cat="shopping" aria-pressed="false" title="Shopping">🛍</button>
    <button class="cat-icon" data-cat="experience" aria-pressed="false" title="Experiences">✨</button>
    <span class="bar-divider"></span>
    <button class="tier-icon" data-bar-tier="S" aria-pressed="true" title="S-Tier"><span class="tier-badge tier-S">S</span></button>
    <button class="tier-icon" data-bar-tier="A" aria-pressed="true" title="A-Tier"><span class="tier-badge tier-A">A</span></button>
    <button class="tier-icon" data-bar-tier="B" aria-pressed="true" title="B-Tier"><span class="tier-badge tier-B">B</span></button>
    <button class="tier-icon" data-bar-tier="C" aria-pressed="true" title="C-Tier"><span class="tier-badge tier-C">C</span></button>
  </div>

  <!-- ── Map ── -->
  <div id="map" role="application" aria-label="Map of Oahu neighborhoods"></div>


  <!-- Screen reader live region for filter changes -->
  <div id="liveRegion" class="sr-only" aria-live="polite" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

  <!-- Legacy list-view kept as hidden shell so JS references don't break -->
  <div class="list-view" id="listView" style="display:none" role="dialog" aria-label="Neighborhood list">
    <div class="list-header">
      <h2>All Neighborhoods</h2>
      <button class="close-list" id="closeList" aria-label="Close list">&times;</button>
    </div>
  </div>

  <div class="install-banner" id="installBanner" role="alert">
    <p>Add to home screen for instant access</p>
    <button class="install-btn" id="installBtn">Install</button>
    <button class="dismiss-btn" id="dismissBtn" aria-label="Dismiss">&times;</button>
  </div>

  <!-- ── Info Panel (fixed bottom card for desktop) ── -->
  <div class="info-panel" id="infoPanel">
    <button class="info-panel-close" id="infoPanelClose" aria-label="Close">&times;</button>
    <div class="info-panel-body" id="infoPanelBody"></div>
  </div>

  <div class="panel-container" id="panelContainer"></div>

  <!-- ── Mobile Card Overlay (outside Leaflet for stable positioning) ── -->
  <div class="mobile-card-overlay" id="mobileCardOverlay">
    <button class="mobile-card-close" id="mobileCardClose" aria-label="Close">&times;</button>
    <div id="mobileCardBody"></div>
  </div>

  <script>
    if (typeof L === 'undefined') {
      document.getElementById('map').innerHTML = '<p style="padding:40px;color:#e94560;text-align:center">Map library failed to load. Please reload.</p>';
    }
    // Force SW update: unregister old, clear all caches, re-register
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (reg) reg.update();
      });
      caches.keys().then(keys => {
        keys.forEach(k => { if (k !== 'oahu-map-v23') caches.delete(k); });
      });
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>

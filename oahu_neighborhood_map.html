    z-index: 1000;

    font-size: 18px;
    font-weight: 900;

    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;

  .header .subtitle {
    font-size: 10px;
    color: var(--text-dim);

  .header-right {

  }

    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: var(--text-dim);

  }
  .score-pill {
    width: 32px;
    text-align: center;
    padding: 5px 0;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* ── Score Range Slider ── */
  .score-filter {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 4px;
  }
  .score-filter label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .score-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    color: #1a1a2e;

  .popup-header {

    gap: 10px;

  .popup-sources strong {
    color: var(--text);

  .leaflet-popup-close-button {
    color: var(--text-dim) !important;
    font-size: 18px !important;
    padding: 6px 8px 0 0 !important;
  }

  /* ── Bottom Panel ── */
  .bottom-panel {

    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;

    height: 12px;

  .legend-label {
    font-size: 9px;

  .list-toggle {

    letter-spacing: 0.5px;

    right: 12px;

    border-radius: 12px;
    padding: 12px 16px;

  .install-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .dismiss-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Tiles are already dark-themed via Carto */

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .header h1 { font-size: 15px; }
    .popup-inner { max-width: 260px; min-width: 200px; }
  }
</style>
</head>

// ── Map Init ──
const map = L.map('map', {
  center: [21.46, -157.97],
  zoom: 11,
  zoomControl: false
});

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap · © CARTO',
  maxZoom: 19
}).addTo(map);

// ── Popup HTML ──
function getPopupHTML(n) {
  return `<div class="popup-inner">
    <div class="popup-header">
      <div class="popup-score" style="background:${SCORE_COLORS[n.score]}">${n.score}</div>
      <div>
        <div class="popup-name">${n.name}</div>
        <div class="popup-region">${n.region}</div>
      </div>
    </div>
    <div class="popup-desc">${n.desc}</div>
    <div class="popup-sources"><strong>Sources:</strong> ${n.sources}</div>
  </div>`;
}

// ── Generate Voronoi Boundaries ──
function generateBoundaries() {
  const points = turf.featureCollection(
    NEIGHBORHOODS.map(n => turf.point([n.lng, n.lat]))
  );
  const bbox = [-158.30, 21.24, -157.64, 21.72];
  const voronoiPolys = turf.voronoi(points, { bbox });
  const oahuPoly = turf.polygon([OAHU_OUTLINE]);

  return NEIGHBORHOODS.map((n, i) => {
    const cell = voronoiPolys.features[i];
    if (!cell) return null;
    try {
      const clipped = turf.intersect(cell, oahuPoly);
      if (clipped) {
        clipped.properties = { ...n, _index: i };
        return clipped;
      }
    } catch (e) { /* skip */ }
    return null;
  });
}

// ── Create Polygon Layers (first, so markers render on top) ──
const boundaryFeatures = generateBoundaries();
const polygonLayers = [];

boundaryFeatures.forEach((feature, i) => {
  if (!feature) { polygonLayers.push(null); return; }
  const n = NEIGHBORHOODS[i];
  const color = SCORE_COLORS[n.score];

  const layer = L.geoJSON(feature, {
    style: {
      fillColor: color,
      fillOpacity: 0.22,
      color: color,
      weight: 1.5,
      opacity: 0.5
    }
  });
  layer.bindPopup(getPopupHTML(n), { maxWidth: 300, closeButton: true });
  layer.data = n;
  layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.40, weight: 2.5, opacity: 0.8 }));
  layer.on('mouseout', () => layer.setStyle({ fillOpacity: 0.22, weight: 1.5, opacity: 0.5 }));
  layer.addTo(map);
  polygonLayers.push(layer);
});

// ── Markers (on top of polygons) ──
let markers = [];

function createIcon(score) {
  const color = SCORE_COLORS[score];
  const size = 12 + score * 1.5;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px; height:${size}px;
      background:${color};
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      box-shadow: 0 0 8px ${color}88, 0 2px 6px rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center;
      font-size:${score >= 8 ? 9 : 8}px; font-weight:700;
      color: #1a1a2e;
      font-family: 'DM Sans', sans-serif;
    ">${score}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

NEIGHBORHOODS.forEach(n => {
  const marker = L.marker([n.lat, n.lng], { icon: createIcon(n.score) });
  marker.bindPopup(getPopupHTML(n), { maxWidth: 300, closeButton: true });
  marker.data = n;
  markers.push(marker);
  marker.addTo(map);
});

// ── Filtering ──
let activeRegion = 'all';
let activeMinScore = 0;

function applyFilters() {
  let count = 0;
  markers.forEach((m, i) => {
    const n = m.data;
    const regionMatch = activeRegion === 'all' ||
      n.region === activeRegion ||
      (activeRegion === 'West Oahu' && (n.region === 'West Oahu' || n.region === 'Waipahu')) ||
      (activeRegion === 'Leeward Coast' && n.region === 'Leeward Coast');
    const scoreMatch = n.score >= activeMinScore;
    const visible = regionMatch && scoreMatch;

    if (visible) {
      if (!map.hasLayer(m)) m.addTo(map);
      count++;
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }

    const poly = polygonLayers[i];
    if (poly) {
      if (visible) {
        if (!map.hasLayer(poly)) poly.addTo(map);
      } else {
        if (map.hasLayer(poly)) map.removeLayer(poly);
      }
    }
  });
  document.getElementById('countDisplay').textContent = count;
  updateList();
}

document.querySelectorAll('.pill[data-region]').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-region]').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.pill[data-minscore]').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeRegion = pill.dataset.region;
    activeMinScore = 0;
    applyFilters();
  });
});

document.querySelectorAll('.pill[data-minscore]').forEach(pill => {
  pill.addEventListener('click', () => {
    const isActive = pill.classList.contains('active');
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    if (isActive) {
      document.querySelector('.pill[data-region="all"]').classList.add('active');
      activeMinScore = 0;
      activeRegion = 'all';
    } else {
      pill.classList.add('active');
      activeMinScore = parseInt(pill.dataset.minscore);
      activeRegion = 'all';
    }
    applyFilters();
  });
});

// ── List View ──
const listView = document.getElementById('listView');
const listScroll = document.getElementById('listScroll');
const listToggle = document.getElementById('listToggle');

listToggle.addEventListener('click', () => {
  listView.classList.toggle('open');
  listToggle.classList.toggle('active');
  updateList();
});
document.getElementById('closeList').addEventListener('click', () => {
  listView.classList.remove('open');
  listToggle.classList.remove('active');
});

function updateList() {
  const visible = markers.filter(m => map.hasLayer(m)).map(m => m.data);
  visible.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
  listScroll.innerHTML = visible.map(n => `
    <div class="list-item" data-lat="${n.lat}" data-lng="${n.lng}">
      <div class="list-score" style="background:${SCORE_COLORS[n.score]}">${n.score}</div>
      <div class="list-info">
        <h3>${n.name}</h3>
        <div class="list-region">${n.region}</div>
        <p>${n.desc}</p>
      </div>
    </div>
  `).join('');

  listScroll.querySelectorAll('.list-item').forEach(item => {
    item.addEventListener('click', () => {
      const lat = parseFloat(item.dataset.lat);
      const lng = parseFloat(item.dataset.lng);
      listView.classList.remove('open');
      listToggle.classList.remove('active');
      map.setView([lat, lng], 14);
      const marker = markers.find(m => m.data.lat === lat && m.data.lng === lng);
      if (marker) marker.openPopup();
    });
  });
}

  document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('dismissBtn').addEventListener('click', () => {
